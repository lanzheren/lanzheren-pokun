<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>破困定位 · 你卡在哪一爻？</title>
<style>
  :root {
    --bg: #f7f5f2;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --accent: #c0392b;
    --accent2: #8e44ad;
    --border: #e5e7eb;
    --shadow: 0 4px 24px rgba(0,0,0,0.06);
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Nav */
  .nav {
    padding: 20px 40px;
    max-width: 800px;
    margin: 0 auto;
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  /* Hero */
  .hero {
    max-width: 800px;
    margin: 0 auto;
    padding: 60px 40px 40px;
    text-align: center;
  }
  .hero-badge {
    display: inline-block;
    background: #fce8e6;
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }
  .hero h1 {
    font-size: 42px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }
  .hero h1 span { color: var(--accent); }
  .hero p {
    font-size: 18px;
    color: var(--muted);
    max-width: 600px;
    margin: 0 auto 32px;
  }

  /* How it works */
  .steps {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 40px 40px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  .step {
    background: var(--card);
    padding: 24px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .step-num {
    width: 28px; height: 28px;
    background: var(--accent);
    color: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    margin-bottom: 12px;
  }
  .step h3 { font-size: 15px; margin-bottom: 6px; }
  .step p { font-size: 13px; color: var(--muted); }

  /* Assessment Section */
  .assessment {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 40px 80px;
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 40px;
  }

  .progress-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
  }
  .progress-dot {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    transition: background 0.3s;
  }
  .progress-dot.active { background: var(--accent); }
  .progress-dot.done { background: var(--accent2); }

  .question { display: none; }
  .question.active { display: block; }

  .question h2 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .question .sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    padding: 16px 20px;
    border: 2px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 15px;
    line-height: 1.4;
  }
  .option:hover {
    border-color: var(--accent);
    background: #fef2f0;
  }
  .option.selected {
    border-color: var(--accent);
    background: #fef2f0;
  }
  .option .desc {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }
  .option .tag {
    display: inline-block;
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 10px;
    background: #f3e8ff;
    color: #7c3aed;
    margin-top: 6px;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }
  .btn {
    padding: 12px 28px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: #a93226; }
  .btn-primary:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }
  .btn-hidden { display: none; }

  /* Result */
  .result-section { display: none; }
  .result-section.active { display: block; }

  .result-badge {
    display: inline-block;
    background: #f3e8ff;
    color: #7c3aed;
    font-size: 13px;
    font-weight: 600;
    padding: 4px 16px;
    border-radius: 20px;
    margin-bottom: 16px;
  }
  .result-box {
    background: #faf5ff;
    border: 2px solid #e9d5ff;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .result-box .label {
    font-size: 11px;
    font-weight: 600;
    color: #7c3aed;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .result-box .content {
    font-size: 16px;
    line-height: 1.7;
    color: var(--text);
  }
  .result-box .action {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed #d8b4fe;
  }
  .result-box .action .label { color: #c0392b; }
  .result-actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
  }

  @media (max-width: 640px) {
    .hero h1 { font-size: 28px; }
    .steps { grid-template-columns: 1fr; }
    .hero, .steps, .assessment { padding-left: 20px; padding-right: 20px; }
    .card { padding: 24px; }
  }
</style>
</head>
<body>

<div class="nav">破困体系 · 诊断工具</div>

<!-- Hero -->
<section class="hero">
  <div class="hero-badge">免费 · 5分钟</div>
  <h1>你卡在 <span>哪一爻</span>？</h1>
  <p>不是所有的困境都需要"振作起来"。先搞清楚你卡在哪里——然后只做那一爻该做的事。</p>
</section>

<!-- Steps -->
<section class="steps">
  <div class="step">
    <div class="step-num">1</div>
    <h3>选你的状态</h3>
    <p>没钱、没力、没人、没方向、还是动不了？先找到入口。</p>
  </div>
  <div class="step">
    <div class="step-num">2</div>
    <h3>定位你的困卦</h3>
    <p>从你的具体描述中，精准匹配到64卦中的唯一一卦。</p>
  </div>
  <div class="step">
    <div class="step-num">3</div>
    <h3>拿到你的处方</h3>
    <p>读到"这说的就是我"的诊断，然后拿到今天就能做的第一个动作。</p>
  </div>
</section>

<!-- Assessment -->
<section class="assessment" id="app">
  <div class="card">
    <div class="progress-bar" id="progressBar"></div>

    <!-- Question container -->
    <div id="questionContainer"></div>

    <!-- Result container -->
    <div class="result-section" id="resultSection">
      <div class="result-badge">🎯 定位完成</div>
      <h2 style="margin-bottom:8px;font-size:24px;" id="resultTitle"></h2>
      <p class="sub" id="resultSubtitle"></p>
      
      <div class="result-box">
        <div class="label">诊断画面</div>
        <div class="content" id="resultDiagnosis"></div>
      </div>

      <div class="result-box" style="background:#fef2f0;border-color:#fecaca;">
        <div class="label" style="color:#c0392b;">→ 今日动作</div>
        <div class="content action" id="resultAction"></div>
      </div>

      <div style="margin-top:20px;padding:16px;background:#f3f4f6;border-radius:12px;text-align:center;font-size:14px;color:var(--muted);">
        想要完整的破困报告（含全部6条行路篇动作）？<br>
        <a href="https://tally.so/r/ZjWEpo" target="_blank" style="color:var(--accent);font-weight:600;text-decoration:underline;">留下邮箱，我们单独发给你 ➜</a>
      </div>

      <div class="result-actions">
        <button class="btn btn-primary" onclick="resetQuiz()">重新测一次</button>
        <button class="btn btn-secondary" onclick="shareResult()">分享结果</button>
      </div>
    </div>
  </div>
</section>

<div class="footer">
  破困体系 · 让更多的小人物破困<br>
  内容持续更新中
</div>

// ==================== QUIZ LOGIC ====================

let state = { step: 0, answers: [] };
const totalSteps = 4;

function getModuleKeys() { return Object.keys(MODULES); }

function initQuiz() {
  state = { step: 0, answers: [] };
  document.getElementById('questionContainer').style.display = 'block';
  document.getElementById('resultSection').classList.remove('active');
  renderProgress();
  renderStep();
}

function renderProgress() {
  const bar = document.getElementById('progressBar');
  bar.innerHTML = '';
  for (let i = 0; i < totalSteps; i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    if (i < state.step) dot.classList.add('done');
    else if (i === state.step) dot.classList.add('active');
    bar.appendChild(dot);
  }
}

function renderStep() {
  renderProgress();
  const container = document.getElementById('questionContainer');
  container.innerHTML = '';
  const q = document.createElement('div');
  q.className = 'question active';

  if (state.step === 0) renderStep0(q);
  else if (state.step === 1) renderStep1(q);
  else if (state.step === 2) renderStep2(q);
  else if (state.step === 3) renderStep3(q);

  container.appendChild(q);
}

// Step 0: Module selection
function renderStep0(q) {
  q.innerHTML = `
    <h2>你现在最困扰的是什么？</h2>
    <p class="sub">选一个最接近你的状态。这不是最终答案，是入口。</p>
    <div class="options">
      <div class="option" data-value="economy" onclick="selectOption(this,'economy')">
        我没钱 / 钱不够<span class="desc">收入在缩、负债、不知道靠什么赚钱</span>
      </div>
      <div class="option" data-value="health" onclick="selectOption(this,'health')">
        我的身体在拖累我<span class="desc">长期疲劳、失眠、动不了、身体在报警</span>
      </div>
      <div class="option" data-value="relation" onclick="selectOption(this,'relation')">

// Step 1: 困卦 selection based on module
function renderStep1(q) {
  const moduleKey = state.answers[0];
  const moduleData = DATA[moduleKey];
  const moduleInfo = MODULES[moduleKey];

  let optionsHTML = '';
  moduleData.forEach((gua, idx) => {
    optionsHTML += `
      <div class="option" data-value="${idx}" onclick="selectOption(this,${idx})">
        ${gua.name}<span class="desc">${gua.core}</span>
      </div>
    `;
  });

  q.innerHTML = `
    <h2>在「${moduleInfo.name}」里，你最像哪种？</h2>
    <p class="sub">不是判断对错，选那个让你心里"嗯"了一下的。</p>
    <div class="options">${optionsHTML}</div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="prevStep()">上一步</button>
      <button class="btn btn-primary" id="btnNext1" disabled onclick="nextStep()">下一步</button>
    </div>
  `;
}

// Step 2: 爻辞 selection
function renderStep2(q) {
  const moduleKey = state.answers[0];
  const guaIdx = state.answers[1];
  const gua = DATA[moduleKey][guaIdx];

  let optionsHTML = '';
  gua.lines.forEach((line, idx) => {
    const preview = line.length > 60 ? line.slice(0, 60) + '……' : line;
    optionsHTML += `
      <div class="option" data-value="${idx}" onclick="selectOption(this,${idx})">
        ${preview}
        <span class="tag">爻${['初','二','三','四','五','上'][idx]}</span>
      </div>
    `;
  });

  q.innerHTML = `
    <h2>哪句话最像你现在的状态？</h2>
    <p class="sub">不用选最精准的，选那个让你点了头的。</p>
    <div class="options">${optionsHTML}</div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="prevStep()">上一步</button>
      <button class="btn btn-primary" id="btnNext2" disabled onclick="nextStep()">看结果</button>
    </div>
  `;
}

// Step 3: Result (simulated - collected by nextStep)
function renderStep3(q) {
  showResult();
}

// Navigation
function selectOption(el, value) {
  const parent = el.closest('.options') || el.parentElement;
  parent.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  state.answers[state.step] = value;

  // Enable next button
  const btnId = ['btnNext0', 'btnNext1', 'btnNext2'][state.step];
  if (btnId) {
    const btn = document.getElementById(btnId);
    if (btn) btn.disabled = false;
  }
}

function nextStep() {
  if (state.step === 2) {
    // Show result
    showResult();
    return;
  }
  state.step++;
  renderStep();
}

function prevStep() {
  if (state.step === 0) return;
  state.step--;
  state.answers.pop();
  renderStep();
}

// Result
function showResult() {
  document.getElementById('questionContainer').style.display = 'none';
  const section = document.getElementById('resultSection');
  section.classList.add('active');

  const moduleKey = state.answers[0];
  const guaIdx = state.answers[1];
  const lineIdx = state.answers[2];
  const gua = DATA[moduleKey][guaIdx];
  const moduleInfo = MODULES[moduleKey];
  const posNames = ['初爻', '二爻', '三爻', '四爻', '五爻', '上爻'];

  document.getElementById('resultTitle').textContent = `${gua.name} · ${posNames[lineIdx]}`;
  document.getElementById('resultSubtitle').textContent = `你卡在「${moduleInfo.name}」的 ${gua.name}·${posNames[lineIdx]}`;
  document.getElementById('resultDiagnosis').textContent = gua.lines[lineIdx];
  document.getElementById('resultAction').textContent = '→ ' + gua.actions[lineIdx];
}

function resetQuiz() {
  initQuiz();
}

function shareResult() {
  const text = `我测了破困定位，卡在「${document.getElementById('resultTitle').textContent}」。`;
  if (navigator.share) {
    navigator.share({ title: '破困定位', text: text, url: window.location.href });
  } else {
    navigator.clipboard.writeText(text + ' ' + window.location.href);
    alert('已复制结果，可以分享给朋友了');
  }
}

// Init
initQuiz();
</script>
</body>
</html>
